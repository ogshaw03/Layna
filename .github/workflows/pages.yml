name: Deploy Layna to GitHub Pages

on:
  push:
    branches: ["claude/shotgrid-project-tool-cpvu2z", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 配信するのはアプリ本体のみ（node_modules や参考ファイルは含めない）
      - name: Stage site
        run: |
          mkdir -p _site
          cp "Layna.html" _site/Layna.html
          cp "Layna.html" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
